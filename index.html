<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modelos — Loretto Scarpa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=Barlow:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* Paleta unificada — mesma da Central de Coleções / Metas */
    --bg:#283d1a; --bg-2:#374f24;
    --surface:#46672f; --surface-2:#60813e;
    --head:#32481f; --hover:#3f5926;
    --band:#2f4a1c; --band-pago:#33491f;
    --border:rgba(212,180,90,.30); --border-strong:rgba(212,180,90,.55);
    --gold:#d4b45a; --gold-2:#ebd48a; --gold-3:#b08840;
    --gold-glow:rgba(212,180,90,.30);
    --cream:#f8f3e6; --cream-2:rgba(248,243,230,.78); --muted:rgba(248,243,230,.52);
    --ok:#5cb85c; --amber:#e0892a; --er:#c0504a;
    --tag-bg:rgba(212,180,90,.14);
    --bg-radial-1:rgba(212,180,90,.08); --bg-radial-2:rgba(70,103,47,.07);
    --shadow-md:0 8px 24px -8px rgba(0,0,0,.4);
    --shadow-lg:0 20px 60px -20px rgba(0,0,0,.5), 0 8px 20px -8px rgba(0,0,0,.3);
    --radius:14px; --radius-sm:9px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--cream);font-family:'Barlow',sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;min-height:100vh}
  body{min-height:100vh;padding-bottom:72px;
    background-image:
      radial-gradient(ellipse at top left, var(--bg-radial-1) 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, var(--bg-radial-2) 0%, transparent 50%);
    background-attachment:fixed}
  ::selection{background:var(--gold);color:var(--bg)}
  .mono{font-family:'DM Mono',monospace}
  .eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}

  /* ============== HEADER ============== */
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 22px;
    background:rgba(40,61,26,.82);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);position:sticky;top:0;z-index:25}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-mark{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;flex:none;
    border:1px solid var(--border-strong);background:linear-gradient(145deg, rgba(212,180,90,.18), rgba(212,180,90,.04));
    font-family:'Playfair Display',serif;font-weight:600;font-size:16px;color:var(--gold-2)}
  .brand .lbl{display:flex;align-items:baseline;gap:6px}
  .brand .l{font-family:'Playfair Display',serif;font-weight:600;font-size:18px;letter-spacing:.01em}
  .brand .s{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:var(--gold)}

  .aviso{margin:14px 22px 0;padding:11px 15px;border-radius:var(--radius-sm);
    background:rgba(224,137,42,.1);border:1px solid rgba(224,137,42,.4);
    font-size:12.5px;color:var(--amber);line-height:1.5}

  /* ============== SHEET HEADER ============== */
  .sheetbar{display:flex;align-items:flex-end;flex-wrap:wrap;gap:18px;padding:26px 22px 18px;max-width:1240px;margin:0 auto}
  .sheetbar h2{font-family:'Playfair Display',serif;font-style:italic;font-weight:500;font-size:32px;line-height:1;color:var(--cream)}
  .sheetbar h2 .ed{font-size:15px;color:var(--gold);opacity:.55;cursor:pointer;margin-left:10px;font-style:normal;transition:.15s}
  .sheetbar h2 .ed:hover{opacity:1}
  .saldo{display:flex;gap:14px;margin-left:auto;flex-wrap:wrap}
  .saldo .b{background:rgba(70,103,47,.45);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 16px;min-width:128px}
  .saldo .b .k{font-family:'DM Mono';font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .saldo .b .v{font-family:'DM Mono';font-size:23px;color:var(--gold-2);margin-top:4px;font-variant-numeric:tabular-nums}
  .saldo .b .v small{font-size:12px;color:var(--muted)}
  .saldo .b .v.q{color:var(--muted);opacity:.7}

  /* ============== TOOLS / BUTTONS ============== */
  .tools{display:flex;gap:9px;padding:6px 22px 0;flex-wrap:wrap;max-width:1240px;margin:0 auto}
  .tbtn{background:rgba(70,103,47,.4);border:1px solid var(--border);color:var(--cream);
    font-family:'Barlow';font-weight:600;font-size:12.5px;padding:9px 15px;cursor:pointer;transition:.18s;border-radius:999px}
  .tbtn:hover{border-color:var(--gold);color:var(--gold-2);background:rgba(212,180,90,.08)}
  .tbtn.amber{color:var(--amber);border-color:rgba(224,137,42,.4);background:rgba(224,137,42,.06)}
  .tbtn.amber:hover{border-color:var(--amber);color:var(--amber)}
  .tbtn.pay{background:linear-gradient(145deg,var(--gold),var(--gold-3));color:var(--bg);border-color:var(--gold);font-weight:700;box-shadow:0 6px 18px -8px var(--gold-glow)}
  .tbtn.pay:disabled{background:rgba(70,103,47,.4);color:var(--muted);border-color:var(--border);cursor:default;box-shadow:none}
  .tbtn.pay:not(:disabled):hover{background:linear-gradient(145deg,var(--gold-2),var(--gold))}

  /* ============== SHEETS / CARDS ============== */
  .sheets{display:grid;grid-template-columns:1fr;gap:22px;padding:18px 22px 30px;max-width:1240px;margin:0 auto}
  @media(min-width:900px){.sheets{grid-template-columns:1.35fr 1fr}}
  .blk{background:rgba(70,103,47,.28);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-md)}
  .cap{display:flex;align-items:center;gap:11px;font-family:'DM Mono';font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:13px}
  .cap .ln{flex:1;height:1px;background:var(--border)}
  .paybar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .paybar .sel{font-family:'DM Mono';font-size:11px;color:var(--muted)}
  .lnk{background:none;border:none;color:var(--gold);font-family:'DM Mono';font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;padding:5px 2px}
  .lnk:hover{color:var(--gold-2);text-decoration:underline}

  /* ============== TABLE ============== */
  .scroll{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-sm)}
  table{border-collapse:collapse;width:100%;min-width:360px;font-variant-numeric:tabular-nums}
  thead th{background:var(--head);font-family:'DM Mono';font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:400;text-align:left;padding:11px 10px;border-bottom:1px solid var(--border);border-right:1px solid rgba(212,180,90,.12);white-space:nowrap}
  tbody td{border-bottom:1px solid rgba(212,180,90,.12);border-right:1px solid rgba(212,180,90,.12);padding:0;background:var(--surface)}
  tbody tr:hover td{background:var(--hover)}
  tbody tr.sel td{background:#4f7030}
  td input,td .cell{width:100%;background:none;border:none;color:var(--cream);font-family:'Barlow';font-size:13.5px;padding:11px 10px}
  td input.num{font-family:'DM Mono';text-align:right;color:var(--gold-2)}
  td input.numneg{font-family:'DM Mono';text-align:right;color:var(--amber)}
  td input:focus{outline:none;background:rgba(212,180,90,.16);box-shadow:inset 0 0 0 1px var(--gold)}
  td input[type=date]{color:var(--muted);font-family:'DM Mono';font-size:11.5px}
  td .del{background:none;border:none;color:var(--amber);opacity:.45;cursor:pointer;font-size:14px;padding:8px;width:100%;transition:.15s}
  td .del:hover{opacity:1}
  td.ck{text-align:center;width:42px}
  td.ck input{width:17px;height:17px;accent-color:var(--gold);cursor:pointer;vertical-align:middle}
  td.pg{width:112px;text-align:center}
  td.pg input[type=checkbox]{width:17px;height:17px;accent-color:var(--gold);cursor:pointer;vertical-align:middle}
  .vcell{display:flex;align-items:center}
  .vcell .cur{padding-left:10px;font-family:'DM Mono';font-size:12px;color:var(--gold-2);opacity:.85}
  .vcell input.num{flex:1;padding-left:5px}
  .paidd{font-family:'DM Mono';font-size:11px;color:var(--ok);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
  .paidd:hover{color:var(--gold-2)}
  .openn{font-family:'DM Mono';font-size:10px;color:var(--amber);opacity:.85}
  .colData{width:118px}.colSap{width:64px}.colVal{width:100px}.colQtd{width:64px}.colDel{width:30px}
  th.colQtd{text-align:center}
  td.colQtd input.numneg, td.colQtd .cell.numneg{text-align:center}
  tfoot .tot.cen{text-align:center}

  tr.band td{background:var(--band);border-right:none;padding:10px 13px;border-top:1px solid var(--border)}
  tr.band.pago td{background:var(--band-pago)}
  .bandrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .bandrow .mn{font-family:'Playfair Display',serif;font-style:italic;font-size:16px;text-transform:capitalize;color:var(--cream)}
  .bandrow .st{font-family:'DM Mono';font-size:10px;letter-spacing:.06em;padding:3px 9px;border-radius:999px}
  .bandrow .st.ab{color:var(--amber);background:rgba(224,137,42,.12)}
  .bandrow .st.ok{color:var(--ok);background:rgba(92,184,92,.12)}

  tfoot td{background:var(--head);border-top:1px solid var(--border);border-right:1px solid rgba(212,180,90,.12);padding:11px 10px;font-family:'DM Mono';font-size:12.5px}
  tfoot .lab{color:var(--muted);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
  tfoot .tot{color:var(--gold-2);text-align:right}
  tfoot .tot.neg{color:var(--amber)}

  .addline{display:block;width:100%;background:none;border:1px dashed var(--border);border-top:none;color:var(--muted);font-family:'DM Mono';font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:11px;cursor:pointer;transition:.18s;border-radius:0 0 var(--radius-sm) var(--radius-sm)}
  .addline:hover{color:var(--gold-2);background:rgba(212,180,90,.06);border-color:var(--gold)}

  .empty{padding:60px 22px;text-align:center;color:var(--muted);font-size:14px;line-height:1.6;max-width:1240px;margin:0 auto}
  .roico{font-family:'DM Mono';font-size:10px;color:var(--muted);letter-spacing:.08em}

  /* ============== TABBAR ============== */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;gap:6px;padding:9px 14px;
    background:rgba(40,61,26,.92);backdrop-filter:blur(12px);border-top:1px solid var(--border);
    overflow-x:auto;scrollbar-width:none;height:56px;align-items:center}
  .tabbar::-webkit-scrollbar{display:none}
  .stab{flex:0 0 auto;background:rgba(70,103,47,.4);border:1px solid var(--border);border-radius:999px;color:var(--cream-2);
    font-family:'Barlow';font-weight:600;font-size:13.5px;padding:8px 18px;cursor:pointer;
    display:flex;align-items:center;gap:8px;transition:.16s}
  .stab:hover{color:var(--cream);border-color:var(--border-strong)}
  .stab.on{background:linear-gradient(145deg,rgba(212,180,90,.2),rgba(212,180,90,.06));border-color:var(--gold);color:var(--gold-2)}
  .stab .dot{width:6px;height:6px;border-radius:50%;background:var(--amber)}
  .stab.add{color:var(--gold);font-size:19px;font-weight:500;padding:8px 16px}
  button:focus-visible,.stab:focus-visible,.lnk:focus-visible{outline:2px solid var(--gold-2);outline-offset:2px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <div class="brand-mark">LS</div>
    <div class="lbl"><span class="l">Loretto</span><span class="s">Scarpa</span></div>
  </div>
  <div class="eyebrow" id="tag">Modelos · controle de parceiros</div>
</div>

<div id="aviso" class="aviso" style="display:none"></div>
<div id="view"></div>
<div class="tabbar" id="tabbar"></div>

<script>
/* ============================================================
   Loretto Scarpa — Modelos (v11)
   Pagamento por SELEÇÃO: marque as gravações (checkbox) e clique
   "Registrar pagamento" → informa a data → baixa só as marcadas.
   Cada gravação guarda: pago (bool) e dataPgto (AAAA-MM-DD).
   A pagar = soma das gravações não pagas. Sapatos acumulam.
   Ganhos agrupados por mês (visual). Retiradas = baixa de sapato.
   ============================================================ */
const KEY='loretto_modelos_v11';
let mov=[], seq=0, roster=[], storageOK=true, aba=null, pendingFocus=null;
let sel=new Set();
const params=new URLSearchParams(location.search);
const TOKEN=params.get('t');
const isAdmin=()=>!TOKEN;

function carregar(){try{const r=localStorage.getItem(KEY);if(r){const o=JSON.parse(r);mov=o.mov||[];seq=o.seq||0;roster=o.roster||[];}}catch(e){storageOK=false;}}
function persistir(){try{localStorage.setItem(KEY,JSON.stringify({mov,seq,roster}));}catch(e){storageOK=false;}if(window.__fbSync)window.__fbSync({mov,seq,roster});render();}

const brlc=v=>(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const tok=()=>Math.random().toString(36).slice(2,8)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const MES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const mesKey=iso=>iso?iso.slice(0,7):'0000-00';
const mesNome=k=>{const[a,m]=k.split('-');return m==='00'?'Sem data':`${MES[+m-1]} ${a}`;};
const dmy=iso=>iso?iso.split('-').reverse().join('/'):'—';
function tokenDe(n){const r=roster.find(x=>x.nome===n);return r?r.token:'';}
function addModelo(n){n=(n||'').trim();if(!n)return null;let r=roster.find(x=>x.nome.toLowerCase()===n.toLowerCase());if(!r){r={nome:n,token:tok()};roster.push(r);}return r;}

function movDe(n,t){return mov.filter(m=>m.modelo===n&&(!t||m.tipo===t));}
function saldoSap(n){let s=0;movDe(n).forEach(m=>s+=(m.tipo==='producao'?(+m.sapatos||0):-(+m.sapatos||0)));return s;}
function aPagar(n){let v=0;movDe(n,'producao').forEach(m=>{if(!m.pago)v+=(+m.dinheiro||0);});return v;}

/* ---------- render ---------- */
function render(){
  const admin=isAdmin();
  if(!admin){
    tabbar.style.display='none';tag.textContent='Acompanhamento · somente leitura';
    const r=roster.find(x=>x.token===TOKEN);
    if(!r){view.innerHTML=`<div class="empty">Link inválido.<br>Peça um novo link à Larissa.</div>`;return;}
    aba=r.nome;view.innerHTML=sheet(r.nome,false);return;
  }
  tag.textContent='Modelos · controle de parceiros';
  const nomes=roster.map(r=>r.nome).sort((a,b)=>a.localeCompare(b));
  tabbar.style.display='flex';
  tabbar.innerHTML=nomes.map(n=>`<button class="stab ${n===aba?'on':''}" ondblclick="renomear('${esc(n)}')" onclick="troca('${esc(n)}')">${esc(n)}${aPagar(n)>0?'<span class="dot"></span>':''}</button>`).join('')+`<button class="stab add" title="Novo modelo" onclick="novoModelo()">+</button>`;
  if(!nomes.length){view.innerHTML=`<div class="empty">Nenhum modelo.<br>Toque em <b style="color:var(--gold-2)">+</b> no rodapé para criar a primeira aba.</div>`;return;}
  if(!aba||!nomes.includes(aba))aba=nomes[0];
  view.innerHTML=sheet(aba,true);
  if(pendingFocus){const el=document.querySelector(`[data-f="${pendingFocus}"]`);if(el)el.focus();pendingFocus=null;}
}

function sheet(nome,ed){
  const sS=saldoSap(nome), sD=aPagar(nome);
  const ganhos=movDe(nome,'producao'), rets=movDe(nome,'retirada').sort((a,b)=>(a.data||'').localeCompare(b.data||''));

  const byM={};
  ganhos.forEach(m=>{const k=mesKey(m.data);(byM[k]=byM[k]||[]).push(m);});
  const meses=Object.keys(byM).sort().reverse();

  // seleção do modelo atual (só não pagas)
  const selIds=[...sel].filter(id=>{const m=mov.find(x=>x.id===id);return m&&m.modelo===nome&&m.tipo==='producao'&&!m.pago;});
  const selTot=selIds.reduce((s,id)=>s+(+mov.find(x=>x.id===id).dinheiro||0),0);

  const colsG=ed?6:5;
  let bodyG='';
  if(!meses.length)bodyG=`<tr><td colspan="${colsG}" style="padding:16px;text-align:center;color:var(--muted);font-size:12.5px">sem gravações</td></tr>`;
  meses.forEach(k=>{
    const items=[...byM[k]].sort((a,b)=>(a.data||'').localeCompare(b.data||'')||(a.ordem||0)-(b.ordem||0));
    const aberto=items.filter(m=>!m.pago).reduce((s,m)=>s+(+m.dinheiro||0),0);
    const todoPago=aberto===0;
    bodyG+=`<tr class="band ${todoPago?'pago':''}"><td colspan="${colsG}"><div class="bandrow">
        <span class="mn">${mesNome(k)}</span>
        <span class="st ${todoPago?'ok':'ab'}">${todoPago?'pago':'em aberto R$ '+brlc(aberto)}</span>
      </div></td></tr>`;
    bodyG+=items.map(m=>{
      const selOn=sel.has(m.id);
      let pgCell;
      if(m.pago) pgCell=`<td class="pg"><span class="paidd" ${ed?`onclick="reabrir('${m.id}')" title="clique para reabrir"`:''}>✓ ${dmy(m.dataPgto)}</span></td>`;
      else if(ed) pgCell=`<td class="pg"><input type="checkbox" ${selOn?'checked':''} onchange="toggleSel('${m.id}')"></td>`;
      else pgCell=`<td class="pg"><span class="openn">a pagar</span></td>`;
      return `<tr class="${selOn?'sel':''}">
        ${ed?`<td class="colData"><input type="date" data-f="${m.id}-d" value="${esc(m.data)}" onchange="upd('${m.id}','data',this.value)"></td>`:`<td class="colData"><span class="cell mono" style="font-size:11.5px;color:var(--muted)">${dmy(m.data)}</span></td>`}
        <td>${ed?`<input type="text" value="${esc(m.titulo)}" placeholder="gravação" onchange="upd('${m.id}','titulo',this.value)">`:`<span class="cell">${esc(m.titulo||'Gravação')}</span>`}</td>
        <td class="colSap">${ed?`<input type="number" class="num" min="0" step="1" value="${m.sapatos||''}" onchange="upd('${m.id}','sapatos',this.value)">`:`<span class="cell num" style="display:block">${m.sapatos||0}</span>`}</td>
        <td class="colVal">${ed?`<div class="vcell"><span class="cur">R$</span><input type="number" class="num" min="0" step="0.01" value="${m.dinheiro||''}" onchange="upd('${m.id}','dinheiro',this.value)"></div>`:`<span class="cell num" style="display:block">${m.dinheiro?'R$ '+brlc(m.dinheiro):'—'}</span>`}</td>
        ${pgCell}
        ${ed?`<td class="colDel"><button class="del" title="Excluir" onclick="del('${m.id}')">×</button></td>`:''}
      </tr>`;}).join('');
  });

  const colsR=ed?4:3;
  let bodyR= rets.length? rets.map(m=>`<tr>
      ${ed?`<td class="colData"><input type="date" value="${esc(m.data)}" onchange="upd('${m.id}','data',this.value)"></td>`:`<td class="colData"><span class="cell mono" style="font-size:11.5px;color:var(--muted)">${dmy(m.data)}</span></td>`}
      <td>${ed?`<input type="text" value="${esc(m.titulo)}" placeholder="sapato retirado" onchange="upd('${m.id}','titulo',this.value)">`:`<span class="cell">${esc(m.titulo||'Retirada')}</span>`}</td>
      <td class="colQtd">${ed?`<input type="number" class="numneg" min="0" step="1" value="${m.sapatos||''}" onchange="upd('${m.id}','sapatos',this.value)">`:`<span class="cell numneg" style="display:block">${m.sapatos||0}</span>`}</td>
      ${ed?`<td class="colDel"><button class="del" onclick="del('${m.id}')">×</button></td>`:''}
    </tr>`).join('') : `<tr><td colspan="${colsR}" style="padding:16px;text-align:center;color:var(--muted);font-size:12.5px">sem retiradas</td></tr>`;
  const totRet=rets.reduce((s,m)=>s+(+m.sapatos||0),0);

  const tools=ed?`<div class="tools">
      <button class="tbtn" onclick="copiarLink('${esc(nome)}')">Copiar link do modelo</button>
      <button class="tbtn amber" onclick="removerModelo('${esc(nome)}')">Remover aba</button>
    </div>`:`<div class="tools"><span class="roico">Histórico fornecido pela Loretto Scarpa · pagamentos no 5º dia útil</span></div>`;

  const paybar=ed?`<div class="paybar">
      <button class="tbtn pay" ${selIds.length?'':'disabled'} onclick="registrarPagamento('${esc(nome)}')">Registrar pagamento${selIds.length?` (${selIds.length} · R$ ${brlc(selTot)})`:''}</button>
      <button class="lnk" onclick="marcarTodasAbertas('${esc(nome)}')">Marcar todas em aberto</button>
      ${selIds.length?`<button class="lnk" onclick="limparSel()">Limpar</button>`:''}
    </div>`:'';

  return `<div class="sheetbar">
      <h2>${esc(nome)}${ed?`<span class="ed" title="Renomear" onclick="renomear('${esc(nome)}')">✎</span>`:''}</h2>
      <div class="saldo">
        <div class="b"><div class="k">Sapatos em aberto</div><div class="v ${sS<=0?'q':''}">${sS} <small>pares</small></div></div>
        <div class="b"><div class="k">A pagar (acumulado)</div><div class="v ${sD<=0?'q':''}">${sD>0?'R$ '+brlc(sD):'—'}</div></div>
      </div>
    </div>
    ${tools}
    <div class="sheets">
      <div class="blk">
        <div class="cap">Ganhos · gravações por mês<span class="ln"></span></div>
        ${paybar}
        <div class="scroll"><table>
          <thead><tr>${ed?'<th class="colData">Data</th>':'<th class="colData">Data</th>'}<th>Gravação</th><th class="colSap">Sapatos</th><th class="colVal">Valor</th><th class="pg">${ed?'Pagar':'Pago'}</th>${ed?'<th class="colDel"></th>':''}</tr></thead>
          <tbody>${bodyG}</tbody>
        </table></div>
        ${ed?`<button class="addline" onclick="addRow('${esc(nome)}','producao')">+ adicionar gravação</button>`:''}
      </div>
      <div class="blk">
        <div class="cap">Retiradas · sapatos pegos<span class="ln"></span></div>
        <div class="scroll"><table>
          <thead><tr><th class="colData">Data</th><th>Sapato retirado</th><th class="colQtd">Qtd</th>${ed?'<th class="colDel"></th>':''}</tr></thead>
          <tbody>${bodyR}</tbody>
          <tfoot><tr><td class="lab" colspan="2">Total retirado</td><td class="tot neg cen">${totRet}</td>${ed?'<td></td>':''}</tr></tfoot>
        </table></div>
        ${ed?`<button class="addline" onclick="addRow('${esc(nome)}','retirada')">+ adicionar retirada</button>`:''}
      </div>
    </div>`;
}

/* ---------- seleção / pagamento ---------- */
function toggleSel(id){if(sel.has(id))sel.delete(id);else sel.add(id);render();}
function limparSel(){sel.clear();render();}
function marcarTodasAbertas(nome){movDe(nome,'producao').forEach(m=>{if(!m.pago)sel.add(m.id);});render();}
function registrarPagamento(nome){
  const ids=[...sel].filter(id=>{const m=mov.find(x=>x.id===id);return m&&m.modelo===nome&&m.tipo==='producao'&&!m.pago;});
  if(!ids.length){alert('Marque as gravações que você está pagando.');return;}
  const tot=ids.reduce((s,id)=>s+(+mov.find(x=>x.id===id).dinheiro||0),0);
  const hoje=new Date().toISOString().slice(0,10);
  const d=prompt(`Registrar pagamento de ${ids.length} gravação(ões) — R$ ${brlc(tot)} ao ${nome}.\nData do pagamento (AAAA-MM-DD):`,hoje);
  if(d===null)return;const data=(d||'').trim()||hoje;
  ids.forEach(id=>{const m=mov.find(x=>x.id===id);m.pago=true;m.dataPgto=data;});
  sel.clear();persistir();
}
function reabrir(id){const m=mov.find(x=>x.id===id);if(!m)return;if(!confirm(`Reabrir esta gravação? Ela volta a contar como a pagar.`))return;m.pago=false;m.dataPgto='';persistir();}

/* ---------- edição ---------- */
function upd(id,campo,val){const m=mov.find(x=>x.id===id);if(!m)return;if(campo==='sapatos')m.sapatos=parseInt(val)||0;else if(campo==='dinheiro')m.dinheiro=parseFloat(val)||0;else m[campo]=val;persistir();}
function addRow(nome,tipo){seq++;const id=uid();mov.push({id,ordem:seq,modelo:nome,tipo,data:new Date().toISOString().slice(0,10),titulo:'',sapatos:tipo==='producao'?2:1,dinheiro:tipo==='producao'?200:0,pago:false,dataPgto:''});addModelo(nome);pendingFocus=id+'-d';persistir();}
function del(id){if(!isAdmin())return;if(!confirm('Excluir esta linha?'))return;mov=mov.filter(x=>x.id!==id);sel.delete(id);persistir();}
function troca(n){aba=n;sel.clear();render();}
function novoModelo(){const n=prompt('Nome do novo modelo:');if(n&&n.trim()){addModelo(n.trim());aba=n.trim();persistir();}}
function renomear(antigo){if(!isAdmin())return;const nv=prompt('Renomear modelo:',antigo);if(nv===null)return;const n=nv.trim();if(!n)return;roster.forEach(r=>{if(r.nome===antigo)r.nome=n;});mov.forEach(m=>{if(m.modelo===antigo)m.modelo=n;});aba=n;persistir();}
function removerModelo(n){const qt=mov.filter(m=>m.modelo===n).length;const msg=qt?`Remover a aba ${n}? Isso apaga ${qt} lançamento(s) e não dá pra desfazer.`:`Remover a aba ${n}?`;if(!confirm(msg))return;mov=mov.filter(m=>m.modelo!==n);roster=roster.filter(r=>r.nome!==n);aba=null;persistir();}
function copiarLink(n){const t=tokenDe(n);const url=`${location.origin}${location.pathname}?t=${t}`;const done=()=>alert(`Link de acompanhamento do ${n}:\n\n${url}\n\nAbre só a aba dele, sem edição.`);if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(url).then(done,()=>prompt('Copie o link:',url));else prompt('Copie o link:',url);}

/* ---------- seed ---------- */
function seed(){
  if(mov.length||roster.length)return;
  ['Eliseu Victtor','Marcos Correia','Tassio Chagas','Rodolfo Marciel','Matheus Kliustany'].forEach(addModelo);
  const a=(mo,ti,da,tt,s,d,pg,pd)=>{seq++;mov.push({id:uid(),ordem:seq,modelo:mo,tipo:ti,data:da,titulo:tt,sapatos:s||0,dinheiro:d||0,pago:!!pg,dataPgto:pd||''});};
  a('Marcos Correia','producao','2026-01-17','Fotos catálogo',2,200,true,'2026-02-05');
  a('Marcos Correia','producao','2026-02-25','Vídeo conteúdo',2,200,true,'2026-03-05');
  a('Marcos Correia','producao','2026-03-30','Fotos sociais',2,200,true,'2026-04-06');
  a('Marcos Correia','producao','2026-05-14','Reels bota',2,200,false);
  a('Marcos Correia','producao','2026-06-05','Campanha inverno',2,200,false);
  a('Marcos Correia','retirada','2026-03-20','Loafer + sneaker',3,0);
  a('Marcos Correia','retirada','2026-05-30','Sneaker branco',1,0);
  a('Rodolfo Marciel','producao','2026-05-14','Fotos casual',2,200,false);
  a('Rodolfo Marciel','producao','2026-06-02','Vídeo conteúdo',2,200,false);
}

/* ---------- boot ---------- */
carregar();
if(!mov.length && !roster.length) seed();   // 1ª pintura local; a nuvem reconcilia depois
render();
</script>
